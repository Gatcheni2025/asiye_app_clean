<!DOCTYPE html>
<html>
<head>
    <title>Payment Successful</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; text-align: center; margin: 0; }
        .container { padding: 20px; }
        .spinner { border: 4px solid rgba(0,0,0,0.1); width: 36px; height: 36px; border-radius: 50%; border-left-color: #09f; animation: spin 1s ease infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="container">
    <div class="spinner"></div>
    <h2>Payment Successful!</h2>
    <p>Your subscription is being activated. Redirecting you back to the app...</p>
</div>

<script>
    // After 3 seconds, redirect back to the main dashboard
    setTimeout(function() {
        window.location.href = 'index.html';
    }, 3000);
</script>
</body>
</html>
