<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>Asiye | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background-color: #0d0d0d; color: #ffffff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; position: relative; }
        .top-bar { width: 100%; padding: 24px; display: flex; justify-content: flex-end; }
        .top-bar a { color: #8a8a8e; text-decoration: none; font-size: 0.95rem; font-weight: 500; }
        .container { width: 100%; max-width: 380px; padding: 0 24px; display: flex; flex-direction: column; align-items: center; margin-top: 5vh; transition: opacity 0.3s; }

        /* ========= ANIMATED STORM SHADE LOGO ========= */
        .storm-logo-section { display: flex; flex-direction: column; align-items: center; margin-bottom: 50px; }
        .storm-shield { position: relative; width: 160px; height: 160px; display: flex; align-items: center; justify-content: center; margin-bottom: 12px; }
        .storm-core { position: relative; width: 130px; height: 130px; background: radial-gradient(circle, rgba(74,0,224,0.4) 0%, rgba(74,0,224,0.05) 80%); border-radius: 28px; display: flex; align-items: center; justify-content: center; z-index: 2; backdrop-filter: blur(4px); }
        .logo-circle-wrapper { width: 100%; height: 100%; border-radius: 28px; overflow: hidden; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 20px rgba(74, 0, 224, 0.7); z-index: 3; background: #ffffff; padding: 15px; }
        .storm-logo-img { width: 100%; height: 100%; object-fit: contain; transition: transform 0.4s ease; }
        .storm-cloud-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 50%; pointer-events: none; z-index: 1; }
        .storm-droplet { position: absolute; background: rgba(120, 70, 255, 0.4); border-radius: 60% 40% 50% 50%; filter: blur(3px); animation: floatStorm 3s infinite ease-in-out; }
        .storm-shade { position: absolute; width: 120%; height: 120%; top: -10%; left: -10%; background: radial-gradient(ellipse at 30% 40%, rgba(100, 50, 255, 0.2), transparent); border-radius: 50%; animation: stormDrift 8s infinite alternate; opacity: 0.8; mix-blend-mode: screen; }
        .lightning-flicker { position: absolute; inset: -5px; border-radius: 50%; background: radial-gradient(circle, rgba(210, 180, 255, 0.3), transparent); opacity: 0; animation: lightningFlash 4s infinite; pointer-events: none; }
        @keyframes floatStorm { 0% { transform: translate(0, 0) scale(1); opacity: 0.5; } 50% { transform: translate(6px, -8px) scale(1.2); opacity: 0.8; } 100% { transform: translate(-4px, 4px) scale(0.9); opacity: 0.4; } }
        @keyframes stormDrift { 0% { transform: rotate(0deg) translate(0px, 0px) scale(1); opacity: 0.6; } 100% { transform: rotate(6deg) translate(6px, -4px) scale(1.08); opacity: 0.9; } }
        @keyframes lightningFlash { 0%, 92%, 96%, 100% { opacity: 0; } 93%, 94% { opacity: 0.65; } 97% { opacity: 0.3; } }
        .logo-text { font-size: 2rem; font-weight: 600; letter-spacing: -0.5px; background: linear-gradient(135deg, #7b9cff 0%, #9851ff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* Action Buttons */
        .btn-group { width: 100%; display: flex; flex-direction: column; gap: 16px; }
        .action-btn { width: 100%; background: transparent; border: 1px solid #333333; border-radius: 30px; padding: 16px; color: #ffffff; font-size: 1rem; font-weight: 500; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; gap: 12px; cursor: pointer; transition: background 0.2s; }
        .action-btn:hover { background: #1a1a1a; }
        .action-btn img { width: 18px; }
        .action-btn i { font-size: 1.1rem; }
        .signup-container { width: 100%; display: none; flex-direction: column; gap: 12px; margin-top: -8px; animation: fadeIn 0.3s; }
        .signup-link { text-align: center; color: #8a8a8e; font-size: 0.9rem; text-decoration: none; padding: 10px; border: 1px solid #222; border-radius: 20px; transition: background 0.2s; }
        .signup-link:hover { background: #1a1a1a; color: #ffffff; }
        #loginForm { width: 100%; display: none; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .input-wrapper { margin-bottom: 16px; }
        .modern-input { width: 100%; padding: 16px 20px; border: 1px solid #333333; border-radius: 30px; background: transparent; font-family: 'Inter', sans-serif; font-size: 1rem; color: #ffffff; outline: none; transition: border-color 0.2s; }
        .modern-input::placeholder { color: #666666; }
        .modern-input:focus { border-color: #555555; }
        .phone-container { display: flex; gap: 10px; align-items: center; }
        .country-code-box { background: transparent; border: 1px solid #333333; border-radius: 30px; padding: 0 16px; height: 54px; display: flex; align-items: center; gap: 8px; font-weight: 500; color: #ffffff; }
        .country-flag { width: 20px; border-radius: 2px; }
        .password-wrapper { position: relative; }
        .password-toggle { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #666666; font-size: 1.1rem; }
        .main-btn { width: 100%; padding: 16px; background: #ffffff; color: #000000; border: none; border-radius: 30px; font-weight: 600; font-size: 1rem; font-family: 'Inter', sans-serif; cursor: pointer; margin-top: 8px; transition: transform 0.1s; }
        .main-btn:active { transform: scale(0.98); }
        .main-btn:disabled { opacity: 0.7; }
        .switch-btn { width: 100%; background: transparent; border: none; color: #8a8a8e; margin-top: 16px; font-size: 0.9rem; cursor: pointer; }
        .back-btn { background: transparent; border: none; color: #ffffff; font-size: 1rem; cursor: pointer; margin-bottom: 24px; display: flex; align-items: center; gap: 8px; }

        /* Terms Footer */
        .terms-footer { margin-top: 40px; display: flex; align-items: flex-start; gap: 12px; width: 100%; color: #8a8a8e; font-size: 0.85rem; line-height: 1.5; text-align: left; }
        .terms-footer a { color: #ffffff; text-decoration: none; }
        .terms-footer input[type="checkbox"] { appearance: none; -webkit-appearance: none; width: 20px; height: 20px; border: 1px solid #555555; border-radius: 50%; background: transparent; cursor: pointer; position: relative; flex-shrink: 0; margin-top: 2px; outline: none; }
        .terms-footer input[type="checkbox"]:checked { background: #ffffff; border-color: #ffffff; }
        .terms-footer input[type="checkbox"]:checked::after { content: '\2713'; position: absolute; color: #000000; font-size: 12px; font-weight: bold; left: 50%; top: 50%; transform: translate(-50%, -50%); }

        /* Toast notifications */
        .toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: #222222; padding: 14px 24px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); display: flex; align-items: center; gap: 12px; z-index: 99999; transition: top 0.4s ease; width: auto; max-width: 90%; border: 1px solid #333; color: white; }
        .toast.show { top: 24px; }
        .toast.error .toast-icon { color: #ff453a; }
        .toast.success .toast-icon { color: #32d74b; }
        .toast-text { font-weight: 500; font-size: 0.9rem; }

        /* Modals */
        #tosOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(4px); display: none; justify-content: center; align-items: center; z-index: 100000; padding: 24px; }
        .tos-card { background: #1c1c1e; border-radius: 24px; max-width: 400px; width: 100%; max-height: 80vh; overflow-y: auto; padding: 28px; position: relative; color: #ffffff; border: 1px solid #333; }
        .close-tos { position: absolute; right: 24px; top: 20px; font-size: 24px; cursor: pointer; color: #8a8a8e; }
        .tos-card h2 { margin-bottom: 16px; font-weight: 600; }
        .tos-card p { color: #a1a1a6; font-size: 0.9rem; margin-bottom: 12px; line-height: 1.5; }
        .accept-btn { background: #ffffff; border: none; padding: 14px; border-radius: 30px; color: #000000; font-weight: 600; width: 100%; margin-top: 24px; cursor: pointer; font-family: 'Inter', sans-serif; }
        .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(0,0,0,0.2); border-radius: 50%; border-top-color: #000; animation: spin 0.7s linear infinite; margin-right: 8px; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Forgot Password */
        .forgot-password-container { width: 100%; text-align: right; margin-top: -8px; margin-bottom: 16px; }
        .forgot-password-link { color: #8a8a8e; font-size: 0.85rem; text-decoration: none; transition: color 0.2s; }
        .forgot-password-link:hover { color: #ffffff; text-decoration: underline; }

        /* Account Selection Modal */
        #accountSelectionOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9); z-index: 100000; display: none;
            flex-direction: column; align-items: center; justify-content: center; padding: 24px;
        }
        #accountSelectionOverlay .selection-card {
            background: #1c1c1e; width: 100%; max-width: 350px; border-radius: 24px;
            padding: 30px; text-align: center; border: 1px solid #333;
        }
    </style>
</head>
<body>

<div id="toastPopup" class="toast">
    <i class="fas fa-circle-exclamation toast-icon"></i>
    <div class="toast-text" id="toastText"></div>
</div>

<!-- Account Selection Overlay -->
<div id="accountSelectionOverlay">
    <div class="selection-card">
        <h2 style="color: white; margin-bottom: 10px; font-weight: 700; font-size: 1.4rem;">Multiple Accounts Found</h2>
        <p style="color: #8a8a8e; font-size: 0.95rem; margin-bottom: 24px;">How would you like to log in today?</p>
        <div id="accountSelectionList" style="display: flex; flex-direction: column; gap: 12px;">
            <!-- Buttons injected via JS -->
        </div>
        <button onclick="cancelAccountSelection()" style="background: transparent; color: #ff453a; border: none; font-weight: 600; margin-top: 20px; cursor: pointer; font-size: 0.95rem; padding: 10px;">
            Cancel & Logout
        </button>
    </div>
</div>

<!-- Top Bar -->
<div class="top-bar">
    <a href="mailto:support@asiye.com">Contact us</a>
</div>

<div class="container">
    <!-- STORM SHADE LOGO SECTION -->
    <div class="storm-logo-section">
        <div class="storm-shield">
            <div class="storm-cloud-layer">
                <div class="storm-shade"></div>
                <div class="lightning-flicker"></div>
                <div class="storm-droplet" style="width: 28px; height: 28px; top: 15%; left: 10%; animation-duration: 2.8s;"></div>
                <div class="storm-droplet" style="width: 18px; height: 22px; top: 60%; left: 75%; animation-duration: 3.5s; opacity: 0.6;"></div>
                <div class="storm-droplet" style="width: 22px; height: 20px; top: 70%; left: 20%; animation-duration: 2.2s;"></div>
                <div class="storm-droplet" style="width: 15px; height: 18px; top: 25%; left: 85%; animation-duration: 4s;"></div>
            </div>
            <div class="storm-core">
                <div class="logo-circle-wrapper">
                    <img src="data/AsiyeNew.png" class="storm-logo-img" alt="Asiye logo" onerror="this.src='https://placehold.co/150x150?text=ASIYE'">
                </div>
            </div>
        </div>
        <div class="logo-text">asiye</div>
    </div>

    <!-- Default Gateway Buttons -->
    <div id="mainGateway" class="btn-group">
        <button id="google-btn" class="action-btn">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google">
            Continue with Google
        </button>
        <button id="apple-btn" class="action-btn">
            <i class="fab fa-apple"></i>
            Continue with Apple
        </button>
        <button class="action-btn" onclick="showEmailLoginForm()">
            <i class="fas fa-lock" style="font-size: 0.9rem;"></i>
            Continue with Password
        </button>
        <button class="action-btn" onclick="toggleSignup()">
            Sign up
        </button>

        <div id="signupOptions" class="signup-container">
            <a href="signup_commuter.html" class="signup-link">Join as Passenger</a>
            <a href="signup_taxi.html" class="signup-link">Join as Driver</a>
            <a href="signup_taxi.html" class="signup-link">Join as Handler</a>
        </div>
    </div>

    <!-- Hidden Input Form -->
    <div id="loginForm">
        <button class="back-btn" onclick="showGateway()">
            <i class="fas fa-chevron-left"></i> Back
        </button>

        <div id="emailInputGroup" class="input-wrapper">
            <input type="email" id="emailInput" class="modern-input" placeholder="Email address" autocomplete="email">
        </div>

        <div id="phoneInputGroup" class="input-wrapper" style="display: none;">
            <div class="phone-container">
                <div class="country-code-box">
                    <img src="https://flagcdn.com/w40/za.png" class="country-flag" alt="ZA"> +27
                </div>
                <input type="tel" id="phoneInput" class="modern-input" placeholder="Phone number" autocomplete="tel">
            </div>
        </div>

        <div class="input-wrapper password-wrapper">
            <input type="password" id="passwordInput" class="modern-input" placeholder="Password">
            <div class="password-toggle" id="passwordToggle">
                <i class="far fa-eye"></i>
            </div>
        </div>
        <div class="forgot-password-container" id="forgotPasswordContainer">
            <a href="forgot_password.html" class="forgot-password-link">Forgot password?</a>
        </div>

        <button id="loginButton" class="main-btn">Sign In</button>
        <button class="switch-btn" id="modeSwitchText" onclick="toggleLoginMode()">Use Phone Number instead</button>
    </div>

    <div class="terms-footer">
        <input type="checkbox" id="termsCheckbox" onchange="acceptTerms()">
        <label for="termsCheckbox" style="cursor:pointer;">
            I confirm that I have read and agree to Asiye's
            <a href="javascript:void(0)" onclick="showTOS('terms')">Terms of Use</a> and
            <a href="javascript:void(0)" onclick="showTOS('privacy')">Privacy Policy</a>
        </label>
    </div>
</div>

<!-- TOS Modal -->
<div id="tosOverlay">
    <div class="tos-card">
        <div class="close-tos" onclick="document.getElementById('tosOverlay').style.display='none'">&times;</div>
        <h2 id="tosTitle"></h2>
        <div id="tosContent"></div>
        <button class="accept-btn" onclick="document.getElementById('termsCheckbox').checked=true; acceptTerms(); document.getElementById('tosOverlay').style.display='none';">Accept & Continue</button>
    </div>
</div>
<div id="recaptcha-container"></div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    // Firebase Setup
    const firebaseConfig = {
        apiKey: "AIzaSyCX_euO2EEPhfhuG5DTsSi5vCpZ9MFZczY",
        authDomain: "asiye-80386.firebaseapp.com",
        databaseURL: "https://asiye-80386-default-rtdb.firebaseio.com",
        projectId: "asiye-80386",
        storageBucket: "asiye-80386.firebasestorage.app",
        appId: "1:531902350858:web:f8a4a246bf350d50e3c1f3"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

    const auth = firebase.auth();
    const database = firebase.database();

    let isAutoLoggingIn = false;
    auth.onAuthStateChanged(async (user) => {
        if (user && !isAutoLoggingIn) {
            isAutoLoggingIn = true;
            document.querySelector('.container').style.opacity = '0.3';
            document.querySelector('.container').style.pointerEvents = 'none';
            showMessage("Resuming session...", "success");
            await redirectUser(user);
            isAutoLoggingIn = false;
        }
    });

    let currentMode = 'email';
    let termsAccepted = false;
    let confirmationResult = null;
    let recaptchaVerifier = null;

    // UI Elements
    const emailGroup = document.getElementById('emailInputGroup');
    const phoneGroup = document.getElementById('phoneInputGroup');
    const emailInput = document.getElementById('emailInput');
    const phoneInput = document.getElementById('phoneInput');
    const passwordInput = document.getElementById('passwordInput');
    const loginBtn = document.getElementById('loginButton');
    const mainGateway = document.getElementById('mainGateway');
    const loginForm = document.getElementById('loginForm');
    const signupOptions = document.getElementById('signupOptions');

    // UI Navigation Functions
    function showEmailLoginForm() { mainGateway.style.display = 'none'; loginForm.style.display = 'block'; }
    function showGateway() { loginForm.style.display = 'none'; mainGateway.style.display = 'flex'; signupOptions.style.display = 'none'; }
    function toggleSignup() { signupOptions.style.display = signupOptions.style.display === 'flex' ? 'none' : 'flex'; }

    document.getElementById('passwordToggle').addEventListener('click', () => {
        const type = passwordInput.type === 'password' ? 'text' : 'password';
        passwordInput.type = type;
        const icon = document.querySelector('#passwordToggle i');
        icon.classList.toggle('fa-eye');
        icon.classList.toggle('fa-eye-slash');
    });

    window.toggleLoginMode = function() {
        if(currentMode === 'email') {
            currentMode = 'phone';
            emailGroup.style.display = 'none';
            phoneGroup.style.display = 'block';
            document.getElementById('modeSwitchText').innerText = 'Use Email instead';
            document.getElementById('forgotPasswordContainer').style.display = 'none';
        } else {
            currentMode = 'email';
            emailGroup.style.display = 'block';
            phoneGroup.style.display = 'none';
            document.getElementById('modeSwitchText').innerText = 'Use Phone Number instead';
            document.getElementById('forgotPasswordContainer').style.display = 'block';

            if(confirmationResult) {
                confirmationResult = null;
                passwordInput.placeholder = 'Password';
                loginBtn.innerText = 'Sign In';
            }
        }
        passwordInput.value = '';
        if(passwordInput.placeholder !== 'Enter 6-digit SMS Code') passwordInput.type = 'password';
        hideStatus();
    };

    window.acceptTerms = function() {
        termsAccepted = document.getElementById('termsCheckbox').checked;
        if(termsAccepted) hideStatus();
    };

    window.showTOS = function(type) {
        const overlay = document.getElementById('tosOverlay');
        overlay.style.display = 'flex';
        const title = document.getElementById('tosTitle');
        const content = document.getElementById('tosContent');
        if(type === 'terms') {
            title.innerText = "Terms of Use";
            content.innerHTML = `<p><strong>1. Services:</strong> Asiye connects commuters with taxi and parcel providers.</p><p><strong>2. Subscription:</strong> Drivers may be charged subscription fees depending on account type.</p><p><strong>3. Account Deletion:</strong> Users can permanently delete their account inside the app settings.</p>`;
        } else {
            title.innerText = "Privacy Policy";
            content.innerHTML = `<p><strong>1. Data Collection:</strong> We collect phone, email, and location data for trip matching and security.</p><p><strong>2. POPIA Compliance:</strong> We comply with South African POPIA privacy regulations.</p><p><strong>3. Account Deletion:</strong> Users can permanently delete their account inside the app settings.</p>`;
        }
    };

    function getCleanErrorMessage(err) {
        if (!err) return "Something went wrong.";
        let code = err.code || '';
        let msg = err.message || String(err);
        const raw = JSON.stringify(err) + " " + msg;
        if (raw.includes('INVALID_LOGIN_CREDENTIALS') || raw.includes('INVALID_PASSWORD') || raw.includes('EMAIL_NOT_FOUND')) return 'Incorrect email or password.';
        if (raw.includes('USER_DISABLED')) return 'Account disabled. Contact support.';
        if (raw.includes('TOO_MANY_ATTEMPTS')) return 'Too many attempts. Try later.';
        if (code === 'auth/invalid-email') return 'Invalid email format.';
        if (code === 'auth/user-not-found' || code === 'auth/wrong-password') return 'Incorrect email or password.';
        if (code === 'auth/too-many-requests') return 'Too many failed attempts. Try later.';
        if (code === 'auth/invalid-verification-code') return 'Invalid SMS verification code.';
        if (code === 'auth/invalid-phone-number') return 'Please enter a valid South African number.';
        let clean = msg.replace(/Firebase:\s*/i, '').replace(/\(auth.*?\)/g, '').trim();
        if (clean.includes('{') || clean.match(/^[A-Z_]+$/)) return 'Authentication error. Please try again.';
        return clean || 'Login failed. Try again.';
    }

    let toastTimeout;
    function showMessage(message, type = 'error') {
        const toast = document.getElementById('toastPopup');
        const toastText = document.getElementById('toastText');
        const iconSpan = toast.querySelector('.toast-icon');
        const finalMsg = getCleanErrorMessage(message);
        toastText.innerText = finalMsg;
        toast.classList.remove('error', 'success');
        toast.classList.add(type);
        if(type === 'success') iconSpan.className = 'fas fa-check-circle toast-icon';
        else iconSpan.className = 'fas fa-exclamation-circle toast-icon';
        toast.classList.add('show');
        clearTimeout(toastTimeout);
        toastTimeout = setTimeout(() => {
            toast.classList.remove('show');
        }, 4500);
    }
    function hideStatus() { document.getElementById('toastPopup').classList.remove('show'); }

    function setLoading(loading) {
        loginBtn.disabled = loading;
        if(loading) loginBtn.innerHTML = '<span class="spinner"></span> Please wait...';
        else loginBtn.innerText = confirmationResult ? 'Verify SMS Code' : 'Sign In';
    }

    // ==========================================
    // MULTIPLE ACCOUNT HANDLING LOGIC
    // ==========================================
    async function redirectUser(user) {
        if(!user) { showMessage("Login incomplete.", "error"); return; }

        localStorage.setItem('userId', user.uid);

        // Fetch all possible account types simultaneously
        const [commuterSnap, taxiSnap, managerSnap, handlerSnap] = await Promise.all([
            database.ref('commuters/' + user.uid).once('value'),
            database.ref('taxis/' + user.uid).once('value'),
            database.ref('rankManagers/' + user.uid).once('value'),
            database.ref('handlers/' + user.uid).once('value')
        ]);

        let availableAccounts = [];

        if(commuterSnap.exists()) {
            availableAccounts.push({ type: 'commuter', url: 'index.html', label: 'Passenger / Commuter', icon: 'fa-user' });
        }
        if(taxiSnap.exists()) {
            const tData = taxiSnap.val();
            // Determine if they are e-Hailing or Minibus
            const label = (tData.vehicleType === 'ehailing') ? 'Driver (Asiye Go)' : 'Driver (Minibus Taxi)';
            availableAccounts.push({ type: 'driver', url: 'taxi.html', label: label, icon: 'fa-car' });
        }
        if(handlerSnap.exists()) {
            availableAccounts.push({ type: 'handler', url: 'taxi.html', label: 'Handler (Courier)', icon: 'fa-box' });
        }
        if(managerSnap.exists()) {
            availableAccounts.push({ type: 'rank_manager', url: 'taxiRank.html', label: 'Rank Manager', icon: 'fa-clipboard-list' });
        }

        if(availableAccounts.length === 0) {
            document.querySelector('.container').style.opacity = '1';
            document.querySelector('.container').style.pointerEvents = 'auto';
            showMessage("No profile found. Please register first.", "error");
            await auth.signOut();
        }
        else if (availableAccounts.length === 1) {
            // Only 1 account -> Proceed immediately
            executeFinalRedirect(availableAccounts[0].type, availableAccounts[0].url, user.uid);
        }
        else {
            // Multiple Accounts -> Prompt User
            showAccountSelectionModal(availableAccounts, user.uid);
        }
    }

    function showAccountSelectionModal(accounts, uid) {
        document.querySelector('.container').style.opacity = '1';
        document.querySelector('.container').style.pointerEvents = 'auto';

        const overlay = document.getElementById('accountSelectionOverlay');
        const list = document.getElementById('accountSelectionList');
        list.innerHTML = '';

        accounts.forEach(acc => {
            const btn = document.createElement('button');
            btn.className = 'action-btn';
            btn.innerHTML = `<i class="fas ${acc.icon}" style="color:#7b9cff;"></i> Continue as ${acc.label}`;
            btn.onclick = () => {
                document.querySelector('.selection-card').style.opacity = '0.5';
                executeFinalRedirect(acc.type, acc.url, uid);
            };
            list.appendChild(btn);
        });

        overlay.style.display = 'flex';
    }

    window.cancelAccountSelection = async function() {
        document.getElementById('accountSelectionOverlay').style.display = 'none';
        await auth.signOut();
        setLoading(false);
    }

    function executeFinalRedirect(type, url, uid) {
        localStorage.setItem('userType', type);
        if (window.Android && window.Android.onUserLoggedIn) {
            window.Android.onUserLoggedIn(uid, type);
        }
        window.location.href = url;
    }

    // ==========================================
    // AUTHENTICATION LOGIC
    // ==========================================
    loginBtn.addEventListener('click', async () => {
        hideStatus();
        if(!termsAccepted) { showMessage("Please agree to Terms & Privacy Policy at the bottom.", "error"); return; }

        if(currentMode === 'email') {
            const email = emailInput.value.trim();
            const pwd = passwordInput.value.trim();
            if(!email || !pwd) { showMessage("Email and password required.", "error"); return; }

            setLoading(true);
            try {
                const cred = await auth.signInWithEmailAndPassword(email, pwd);
                await redirectUser(cred.user);
            } catch(e) {
                showMessage(e, "error");
                setLoading(false);
            }
        }
        else {
            let rawNumber = phoneInput.value.replace(/\D/g,'');
            if(rawNumber.startsWith('27')) rawNumber = rawNumber.substring(2);
            else if(rawNumber.startsWith('0')) rawNumber = rawNumber.substring(1);
            const fullPhone = '+27' + rawNumber;

            if(!phoneInput.value.trim()) { showMessage("Enter phone number.", "error"); return; }

            if(!confirmationResult) {
                try {
                    if(!recaptchaVerifier) recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', { size: 'invisible' });
                    setLoading(true);
                    confirmationResult = await auth.signInWithPhoneNumber(fullPhone, recaptchaVerifier);
                    passwordInput.placeholder = '6-digit SMS code';
                    passwordInput.value = '';
                    loginBtn.innerText = 'Verify SMS Code';
                    showMessage("Verification code sent.", "success");
                } catch(e) {
                    showMessage(e, "error");
                    if(recaptchaVerifier) { recaptchaVerifier.clear(); recaptchaVerifier = null; }
                }
                setLoading(false);
            } else {
                const otp = passwordInput.value.trim();
                if(!otp) { showMessage("Enter the code you received.", "error"); return; }
                setLoading(true);
                try {
                    const result = await confirmationResult.confirm(otp);
                    await redirectUser(result.user);
                } catch(e) {
                    showMessage("Invalid or expired code.", "error");
                    setLoading(false);
                }
            }
        }
    });

    document.getElementById('google-btn').addEventListener('click', async () => {
        if(!termsAccepted) { showMessage("Please agree to Terms & Privacy Policy at the bottom.", "error"); return; }
        if (window.Android && window.Android.postMessage) {
            window.Android.postMessage("triggerGoogleSignIn");
        } else {
            try {
                const provider = new firebase.auth.GoogleAuthProvider();
                const res = await auth.signInWithPopup(provider);
                await redirectUser(res.user);
            } catch(e) { showMessage(e, "error"); }
        }
    });

    document.getElementById('apple-btn').addEventListener('click', async () => {
        if(!termsAccepted) { showMessage("Please agree to Terms & Privacy Policy at the bottom.", "error"); return; }
        if (window.Android && window.Android.postMessage) {
            window.Android.postMessage("triggerAppleSignIn");
        } else {
            try {
                const provider = new firebase.auth.OAuthProvider('apple.com');
                const res = await auth.signInWithPopup(provider);
                await redirectUser(res.user);
            } catch(e) { showMessage(e, "error"); }
        }
    });

    // Native Bridge Callbacks
    window.onGoogleNativeLoginSuccess = function(userData) {
        let data = userData;
        if (typeof userData === 'string') { try { data = JSON.parse(userData); } catch(e) {} }
        const idToken = data.idToken;
        if (!idToken) return showMessage('Google Sign-In failed.', 'error');
        const cred = firebase.auth.GoogleAuthProvider.credential(idToken);
        auth.signInWithCredential(cred)
            .then(res => redirectUser(res.user))
            .catch(e => showMessage(e, "error"));
    };
    window.onGoogleNativeLoginError = function(error) { showMessage(error || "Google Sign-In failed.", "error"); };

    window.onAppleNativeLoginSuccess = function(userData) {
        let data = userData;
        if (typeof userData === 'string') { try { data = JSON.parse(userData); } catch(e) {} }
        const idToken = data.identityToken;
        if (!idToken) return showMessage('Apple Sign-In failed.', 'error');
        const provider = new firebase.auth.OAuthProvider('apple.com');
        const cred = provider.credential({ idToken: idToken });
        auth.signInWithCredential(cred)
            .then(res => redirectUser(res.user))
            .catch(e => showMessage(e, "error"));
    };
    window.onAppleNativeLoginError = function(error) { showMessage(error || "Apple Sign-In failed.", "error"); };
</script>
</body>
</html>
